<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for="opacitySlider">Adjust Opacity: </label>
    <input type="range" id="opacitySlider" min="0" max="1" step=".1" value="1" oninput="changeOpacity()">
    <br>
    <img src="IMG_20251001_093540_599.jpg" id="sample" style="width: 400px; height: 300px;">

    <script>
        function changeOpacity(){
            var opacityValue = document.getElementById("opacitySlider").value;
            var image = document.getElementById("sample")
            image.style.opacity = opacityValue
        }


    </script>
</body>
</html>
